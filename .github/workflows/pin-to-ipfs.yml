name: Pin bigbro to IPFS via Pinata

on:
  push:
    branches:
      - main

jobs:
  pin-to-pinata:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js 24
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install pinata-sdk

      - name: Pin bigbro folder to Pinata
        run: |
          node -e "
          const pinataSDK = require('pinata-sdk');
          const path = require('path');
          const pinata = pinataSDK(process.env.PINATA_API_KEY, process.env.PINATA_API_SECRET);

          const folderPath = path.join(process.cwd(), 'bigbro');
          console.log('Pinning folder:', folderPath);

          pinata.pinFromFS(folderPath, {pinataMetadata: {name: 'bigbro-site'}})
            .then(result => console.log('Pinned! CID:', result.IpfsHash))
            .catch(err => { console.error('Pin failed:', err); process.exit(1); });
          "
